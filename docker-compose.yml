# ABS Resolve — deploy EasyPanel (Docker Compose)
# 1. Crie projeto "Compose" no EasyPanel apontando para este repositório
# 2. Cole o conteúdo de deploy/easypanel.env em Environment
# 3. Domínio no serviço "web", porta 80
# 4. Deploy

name: abs-resolve

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL
      - DIRECT_URL
      - SUPABASE_URL
      - SUPABASE_SERVICE_ROLE_KEY
      - SUPABASE_STORAGE_BUCKET
      - JWT_SECRET
      - JWT_REFRESH_SECRET
      - JWT_EXPIRES_IN
      - JWT_REFRESH_EXPIRES_IN
      - FRONTEND_URL
      - API_PUBLIC_URL
      - ASAAS_API_KEY
      - ASAAS_API_URL
      - ASAAS_MOCK
      - ASAAS_WEBHOOK_TOKEN
      - ASAAS_CNPJ
      - OPENAI_API_KEY
      - OPENAI_MODEL
      - SMTP_HOST
      - SMTP_PORT
      - SMTP_USER
      - SMTP_PASS
      - SMTP_FROM
      - WHATSAPP_TOKEN
      - WHATSAPP_API_URL
      - RUN_SEED
      - PORT=3001
      - UPLOAD_DIR=uploads
      - NODE_ENV=production
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

volumes:
  backend_uploads:
