# ABS Resolve — deploy EasyPanel (Docker Compose)
# Ambiente: painel ESQUERDO do projeto Compose → Environment → "Create .env file" ON
# Cole deploy/easypanel.env.local (sem linhas #) → Salvar → Deploy

name: abs-resolve

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      PORT: "3001"
      UPLOAD_DIR: uploads
      NODE_ENV: production
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"

volumes:
  backend_uploads:
