services:
  postgres:
    image: postgres:16-alpine
    container_name: abs_resolve_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: abs
      POSTGRES_PASSWORD: abs123
      POSTGRES_DB: abs_resolve
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abs -d abs_resolve"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
