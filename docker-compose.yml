# ABS Resolve — deploy EasyPanel (Docker Compose)
# 1. Crie projeto "Compose" no EasyPanel apontando para este repositório
# 2. Cole o conteúdo de deploy/easypanel.env em Environment
# 3. Domínio no serviço "web", porta 80
# 4. Deploy

name: abs-resolve

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # Variáveis sensíveis (DATABASE_URL, JWT, etc.): configure na aba
    # Ambiente do serviço "backend" no EasyPanel — NÃO use pass-through
    # vazio (- DATABASE_URL), pois isso sobrescreve o valor do painel.
    environment:
      PORT: "3001"
      UPLOAD_DIR: uploads
      NODE_ENV: production
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

volumes:
  backend_uploads:
